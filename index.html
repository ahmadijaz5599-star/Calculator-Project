<!DOCTYPE html>
<html lang="eng">
    <head>

         <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Calculator</title>

        <style>

            body{
                background-color: rgb(21, 22, 23);
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;

            }
            
            .js-display{
                color: azure;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-weight: 570;
                width: 100%;
                box-sizing: border-box;
                font-size: 50px;
                min-height: 50px;
                text-align: right;
                padding: 10px;
                overflow-x: auto;
                overflow-y: hidden;
                white-space: nowrap;
            }

            .js-display::-webkit-scrollbar {
                display: hidden;
            }

            .calculator{
                width: 260px;
                border: rgb(255, 196, 88) solid;
                border-radius: 50px;
            }

            .B{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                margin-bottom: 10px;
                margin-left: 10px;
                margin-right: 10px;
            }
            
            .button{
                color: rgb(0, 0, 0);
                font-size: 25px;
                background-color: grey;
                border: none;
                padding: 10px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                margin: 3px;
                cursor: pointer;
            }
            .button:hover{
                padding: 12px;
                color: black;
                background-color: rgb(204, 204, 204);
            }

            .buttons{
                color: rgb(255, 255, 255);
                background-color: orange;
                border: black;
                font-size: 27px;
                float: right;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                margin: 3px;
                cursor: pointer;
            }
            .buttons:hover{
                background-color: rgb(251, 193, 85);
            }

            .clear-button{
                color: rgb(255, 255, 255);
                font-size: 20px;
                background-color: rgb(72, 72, 72);
                border: none;
                padding: 10px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                margin: 3px;
                cursor: pointer;
            }
            .clear-button:hover{
                background-color: rgb(204, 204, 204);
                color: black;
            }

        </style>
        
    </head>
    <body>

        <div class="calculator">

 

 <p class="js-display"></p>

        <div class="B">

        <button class="button" onclick="
                updateCalculation('1');
                ">1</button>

                <button class="button" onclick="
                updateCalculation('2');
                ">2</button>

                <button class="button" onclick="
                updateCalculation('3');
                ">3</button>

                <button class="buttons" onclick="
                updateCalculation('+');
                ">+</button>

       

            <button class="button" onclick="
                updateCalculation('4');
                ">4</button>

                <button class="button" onclick="
                updateCalculation('5');
                ">5</button>

                <button class="button" onclick="
                updateCalculation('6');
                ">6</button>

                <button class="buttons" onclick="
                updateCalculation('-');
                ">-</button>

       
            
            <button class="button" onclick="
                updateCalculation('7');
                ">7</button>

                <button class="button" onclick="
                updateCalculation('8');
                ">8</button>

                <button class="button" onclick="
                updateCalculation('9');
                ">9</button>

                <button class="buttons" onclick="
                updateCalculation('*');
                ">&times;</button>
        
                <button class="button" onclick="
                updateCalculation('.');
                ">.</button>

                <button class="button" onclick="
                updateCalculation('0');
                ">0</button>

                

                <button class="buttons" onclick="
                calculation = eval(calculation);
                console.log(calculation);
                displayCalculation();
                localStorage.setItem('calculation', calculation);
                ">=</button>

                <button class="buttons" onclick="
                updateCalculation('/');
                ">÷</button>

                <button class="clear-button" onclick="
                calculation = '';
                displayCalculation();
                localStorage.removeItem('calculation');
                console.log('Cleared')
                ">AC</button>

    </div>

</div>

       

        <script>
            let calculation = localStorage.getItem('calculation') || '';
            displayCalculation();

            function updateCalculation(value){
                calculation += value;
                console.log(calculation);
                
                displayCalculation();

                localStorage.setItem('calculation', calculation);
            }

            function saveCalculation(){
                localStorage.setItem('calculation', calculation);
            }

            function displayCalculation(){

                let displayElement = document.querySelector('.js-display');
                if(calculation === ''){
                    displayElement.innerHTML = '0';
                } else {
                    displayElement.innerHTML = calculation;
                }

                displayElement.scrollLeft = displayElement.scrollWidth;
            }
            

        </script>
    </body>
</html>

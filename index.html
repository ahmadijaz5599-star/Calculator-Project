<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <style>

            body{
                background-color: rgb(45, 46, 47);
            }
            
            .js-display{
                color: azure;
                font-family: Arial, Helvetica, sans-serif;
                width: 219px;
                font-size: 30px;
                min-height: 40px;
                text-align: right;
                padding: 10px;
            }

            .calculator{
                width: 240px
            }
            
            .button{
                color: rgb(0, 0, 0);
                font-size: 20px;
                background-color: grey;
                border: none;
                padding: 10px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                margin: 3px;
            }
            button:hover{
                padding: 12px;
                color: black;
                background-color: rgb(204, 204, 204);
            }

            .buttons{
                background-color: rgb(145, 211, 13);
                border: navajowhite;
                font-size: 19px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                margin: 3px;
            }
            .buttons:hover{
                background-color: rgb(89, 88, 88);
                border: rgb(9, 9, 9);
            }

            .clear-cal{
                color: rgb(0, 0, 0);
                background-color: rgb(124, 186, 0);
                float: right;
                font-size: 20px;
                margin-right: 50px;
                border: none;
                padding: 10px;
                border-radius: 50%;
                margin: 3px;
            }
            .clear-cal:hover{
                padding: 10px;
                background-color: grey;
            }
        </style>
    </head>
    <body>

        <div class="calculator">

    
 <p class="js-display"></p>

        <div class="B">

        <button class="button" onclick="
                updateCalculation('1');
                ">1</button>

                <button class="button" onclick="
                updateCalculation('2');
                ">2</button>

                <button class="button" onclick="
                updateCalculation('3');
                ">3</button>

                <button class="buttons" onclick="
                updateCalculation('+');
                ">+</button>

       

            <button class="button" onclick="
                updateCalculation('4');
                ">4</button>

                <button class="button" onclick="
                updateCalculation('5');
                ">5</button>

                <button class="button" onclick="
                updateCalculation('6');
                ">6</button>

                <button class="buttons" onclick="
                updateCalculation('-');
                ">-</button>

       
            
            <button class="button" onclick="
                updateCalculation('7');
                ">7</button>

                <button class="button" onclick="
                updateCalculation('8');
                ">8</button>

                <button class="button" onclick="
                updateCalculation('9');
                ">9</button>

                <button class="buttons" onclick="
                updateCalculation('*');
                ">*</button>

        

            <button class="button" onclick="
                updateCalculation('0');
                ">0</button>

                <button class="button" onclick="
                updateCalculation('.');
                ">.</button>

                <button class="buttons" onclick="
                calculation = eval(calculation);
                console.log(calculation);
                displayCalculation();
                localStorage.setItem('calculation', calculation);
                ">=</button>

                <button class="buttons" onclick="
                updateCalculation('/');
                ">/</button>

        
            <button class="clear-cal" onclick="
                calculation = '';
                displayCalculation();
                localStorage.removeItem('calculation');
                console.log('Cleared')
                ">Clear</button>
        
    </div>

</div>

       

        <script>
            let calculation = localStorage.getItem('calculation') || '';
            displayCalculation();

            function updateCalculation(value){
                calculation += value;
                console.log(calculation);
                
                displayCalculation();

                localStorage.setItem('calculation', calculation);
            }

            function saveCalculation(){
                localStorage.setItem('calculation', calculation);
            }

            function displayCalculation(){
                document.querySelector('.js-display').innerHTML = calculation;
            }
            

        </script>
    </body>
</html>
